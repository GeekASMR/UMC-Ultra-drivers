<script>
let logs = [];

// жһ„е»әж”ҜжҢҒеҺҹз”ҹиҝӣеәҰзӣ‘еҗ¬зҡ„е…ЁеұҖ XHR Promise
const uploadViaXHR = (url, bodyData, fileObj = null) => {
  return new Promise((resolve) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", url, true);
      
      xhr.upload.onprogress = (e) => {
          if (e.lengthComputable && fileObj) {
              const percent = Math.round((e.loaded / e.total) * 100);
              const pCon = document.getElementById("upload_progress_container");
              const pTxt = document.getElementById("upload_progress_text");
              const pBar = document.getElementById("upload_progress_bar");
              pCon.style.display = "block";
              pTxt.style.display = "block";
              pBar.style.width = percent + "%";
              pBar.style.background = percent === 100 ? "#4caf50" : "var(--cyan)";
              pTxt.innerText = "рҹ“Ө " + percent + "%  /  " + (e.loaded / 1024 / 1024).toFixed(2) + " MB";
          }
      };

      xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
              try {
                  const res = JSON.parse(xhr.responseText);
                  resolve({ ok: true, json: () => Promise.resolve(res) });
              } catch(err) { resolve({ ok: false }); }
          } else {
              resolve({ ok: false });
          }
      };

      xhr.onerror = () => resolve({ ok: false });

      if (typeof bodyData === 'string') {
          xhr.setRequestHeader('Content-Type', 'application/json');
      }
      xhr.send(bodyData);
  });
};

const API_URL = "/asio/asmrtap.php?api=test_logs";

async function loadData() {
  let dbLogs = [];
  try {
    let res = await fetch(API_URL, { cache: 'no-store' });
    if (!res.ok) {
      res = await fetch("/asmrtap.php?api=test_logs", { cache: 'no-store' });
    }
    if (res.ok) {
      dbLogs = await res.json();
    }
  } catch(e) {
    console.error("Fetch DB failed", e);
  }

  let deletedIds = JSON.parse(localStorage.getItem('deleted_ids') || '[]');
  
  let userLogs = [];
  const localD = localStorage.getItem('asio_test_logs');
  if (localD) {
    let localLogs = JSON.parse(localD);
    userLogs = localLogs.filter(l => l.id > 1000000 && !deletedIds.includes(l.id));
  }
  
  // иҝҮж»ӨжҺүжүҖжңүиў«з®ЎзҗҶе‘ҳеңЁжң¬ең°жү“е…ҘеҶ·е®«зҡ?ID
  let activeDB = dbLogs.filter(l => !deletedIds.includes(l.id));
  let activeDefaults = defaultLogs.filter(l => !deletedIds.includes(l.id));
  
  // е®ҢзҫҺдёүж–№еҗҲе№¶зӯ–з•Ҙпјҡжң¬ең°жҸҗдәӨзҡ„й«ҳдјҳе…ҲпјҲдҝқиҜҒдёҚдёўпјүпјҢиҝңз«ҜеӨ§зӣҳеә“и·ҹйҡҸпјҢжңҖеҗҺеһ«еә•й»ҳи®?  logs = [...userLogs, ...activeDB, ...activeDefaults];
  
  // йҷҚзә§еҺ»йҮҚ (зӣёеҗҢ ID еҸ–жңҖйқ еүҚзҡ„й«ҳдјҳе…Ҳзә§е…ғзҙ?
  const seen = new Set();
  logs = logs.filter(l => {
    if (seen.has(l.id)) return false;
    seen.add(l.id);
    return true;
  });
  
  saveData();
  render();
}
  
function saveData() {
  localStorage.setItem('asio_test_logs', JSON.stringify(logs));
}

function getRateClass(r) {
  if (r.includes('48000') || r.includes('48kHz')) return 'rate-48';
  if (r.includes('44100') || r.includes('44.1kHz')) return 'rate-44';
  if (r.includes('96000') || r.includes('88200') || r.includes('96kHz') || r.includes('192kHz')) return 'rate-96';
  return 'rate-other';
}

function getStatusInfo(st) {
  if (st === 'pass') return {c: 'st-pass', t: 'вң?жһҒжҳјйҳІзҲҶ (0 Pop)'};
  if (st === 'warn') return {c: 'st-warn', t: 'вҡ пёҸ еҗҲж ј (дҪҶе»әи®®з»ҹдёҖ)'};
  return {c: 'st-fail', t: 'вқ?и·Ёйў‘жӯ»еҢәйҷҗеҲ¶'};
}

function render() {
  const tb = document.getElementById('tb');
  tb.innerHTML = '';
  logs.forEach(l => {
    const tr = document.createElement('tr');
    const sti = getStatusInfo(l.status);
    
    // Support customized status if it is directly matched from old defaults
    let dispStatus = sti.t;
    if (l.status.includes('вң?) || l.status.includes('вқ?) || l.status.includes('вҡ пёҸ')) {
      dispStatus = l.status;
    } else {
      let mapping = {
        'pass': 'вң?з»қеҜ№жһҒжҳјйҳІзҲҶи“қеұҸзә?(0 Pop/Click)',
        'warn': 'вҡ пёҸ еҗҲж јдҪҶејәзғҲе»әи®®йҒҝи®?,
        'fail': 'вқ?и·Ёйў‘жӯ»еҢәзҲҶйҹіпјҡдёҘзҰҒдҪҝз”?
      };
      dispStatus = mapping[l.status] || dispStatus;
    }

    tr.innerHTML = `
      <td style="font-weight:600;color:var(--cyan)">${l.card || 'йҖҡз”Ёи®ҫеӨҮ'}</td>
      <td><span class="rate-box ${getRateClass(l.host)}">${l.host} Hz</span></td>
      <td><span class="rate-box ${getRateClass(l.wdm)}">${l.wdm.replace('16bit ','').replace('24bit ','').replace('32bit ','')}</span></td>
      <td><span class="buf-box">${l.buffer}</span></td>
      <td><span class="algo">${l.algo}</span></td>
      <td>
        <div class="${sti.c}">${dispStatus}</div>
        <div class="desc" style="color:var(--txt2)">${l.desc}</div>
        ${l.feel ? `<div class="desc" style="color:#fff; margin-top:8px; padding-top:8px; border-top:1px dashed rgba(255,255,255,0.1);"><strong>еҗ¬ж„ҹ:</strong> ${l.feel}</div>` : ''}

  });
}

function checkAuth() {
  return new Promise((resolve) => {
    const modal = document.getElementById('authModal');
    const input = document.getElementById('authInput');
    const btnCancel = document.getElementById('authCancel');
    const btnOk = document.getElementById('authOk');
    
    modal.style.display = 'flex';
    input.value = '';
    setTimeout(() => input.focus(), 50);
    
    const cleanup = () => {
      modal.style.display = 'none';
      btnCancel.onclick = null;
      btnOk.onclick = null;
      input.onkeydown = null;
    };
    
    btnCancel.onclick = () => {
      cleanup();
      resolve(null); // Cancel returns null
    };
    
    const submit = () => {
      const val = input.value;
      cleanup();
      if(val === 'asmrtop') resolve(true);
      else resolve(false);
    };
    
    btnOk.onclick = submit;
    input.onkeydown = (e) => {
      if(e.key === 'Enter') submit();
      if(e.key === 'Escape') btnCancel.onclick();
    };
  });
}

async function removeEntry(id) {
  const auth = await checkAuth();
  if (auth === null) return;
  if (!auth) { alert("еҜҶз Ғй”ҷиҜҜпјҢжқғйҷҗжӢ’з»қпјҒ"); return; }
  
  logs = logs.filter(l => l.id !== id);
  
  let deletedIds = JSON.parse(localStorage.getItem('deleted_ids') || '[]');
  if (!deletedIds.includes(id)) {
    deletedIds.push(id);
    localStorage.setItem('deleted_ids', JSON.stringify(deletedIds));
  }
  
  // еҗҢжӯҘеҲ°дә‘з«?  fetch(API_URL, {
    method: 'POST', body: JSON.stringify({ action: 'delete', id: id, auth: 'asmrtop' })
  }).then(r => { if(!r.ok) fetch('/asmrtap.php?api=test_logs', { method:'POST', body: JSON.stringify({ action: 'delete', id: id, auth: 'asmrtop' }) }); });
  
  saveData();
  render();
}

  if(confirm("зЎ®е®ҡиҰҒеҪ»еә•жҠ№йҷӨеҲ—иЎЁдёҠзҡ„е…ЁйғЁж•°жҚ®еҗ—пј?иҝҷеҸӘдјҡеңЁжң¬ең°йҡҗи—Ҹж•°жҚ®пјҢз»ҷжӮЁдёҖдёӘе№ІеҮҖзҡ„йқўжқ?")) {

    let deletedIds = JSON.parse(localStorage.getItem('deleted_ids') || '[]');
    logs.forEach(l => {

    logs = [];

function autoPredict() {
  const host = parseInt(document.getElementById('i_host').value);
  const wdmStr = document.getElementById('i_wdm').value;
  let wdm = 48000;
  if(wdmStr.includes('44.1kHz')) wdm = 44100;
  if(wdmStr.includes('96kHz')) wdm = 96000;
  if(wdmStr.includes('192kHz')) wdm = 192000;
  
  const bufferStr = document.getElementById('i_buffer').value;
  const buf = parseInt(bufferStr);
  
  let algo = 'иҮӘйҖӮеә”и·Ёйў‘дҪҚз§»жј”з®— (Adaptive SRC)';
  let st = 'pass';
  let descObj = document.getElementById('i_desc');
  let autoDesc = '';
  
  if (host === wdm) {
    algo = 'Prefill Cushing зј“еҶІжұ?1:1 дҪҚеҜ№дҪҚзӣҙйҖ?(0 SRC)';
    st = 'pass';
    autoDesc = 'еә•еұӮдёҚдә§з”ҹд»»дҪ•жӢүдјёжҸ’еҖјпјҢеҪ»еә•жҠӣејғдёўеҢ…дёҺе’”е“’еЈ°пјҢе®һжңәжһҒеҶ»йқҷи°§гҖ?;
  } else if (host === 96000 && wdm === 48000 || host === 88200 && wdm === 44100) {
    algo = '2X ж•ҙж•°еҖҚеҠҲдҪҚзӣҙйҷҚжҲӘеҸ?(Integer Div Downsample)';
    st = 'pass';
    autoDesc = 'зәҜз®—жңҜжҠҪзЁҖжӢҰжҲӘпјҢиҙҹжӢ…жһҒе°ҸпјҢзЁіе®ҡйҳІжқӮйҹігҖ?;
  } else if (host > wdm) {
    algo = 'й«ҳеҶ—дҪҷйҷҚйў‘жө®зӮ№еҜ№еҗ‘зј“жҺ?(Hi-to-Lo Soft SRC)';
    if (buf < 128) {
      st = 'warn';
      autoDesc = 'зј“еҶІжһҒе°Ҹж—¶зҡ„й«ҳиҙҹиҪҪжҠҪиҪЁеҸҜиғҪдјҡйҖјиҝ‘з®—еҠӣз•ҢйҷҗпјҢе»әи®®жҸҗй«ҳе®ҝдё»зј“еҶІгҖ?;
    } else {
      st = 'pass';
      autoDesc = 'з”ұдәҺзӣ®ж ҮйҖҡйҒ“еёҰе®ҪжӣҙзӘ„пјҢе№іж»‘еҺӢзј©жө®зӮ№жёёеҲғжңүдҪҷгҖ?;
    }
  } else if (host < wdm) {
    algo = 'ејәеҲ¶еЎ«йӣ¶ејәжҸҗжӢүдјёзҹ©йҳө (Lo-to-Hi Forced Upsample)';
    st = 'warn';
    autoDesc = 'з”ұдәҺйҮҮж ·еҝ…йЎ»д»ҺдҪҺдҪҚжҺЁеҗ‘й«ҳдҪҚпјҢз®—жі•дёҚеҫ—дёҚеЎ«е……жһҒеӨҡеҶ—дҪҷдјӘж јпјҢеӯҳеңЁеӨұзңҹжҲ–жӢүжүҜж„ҹйЈҺйҷ©пјҢе»әи®®дҝ®ж”№Windowsеә•еұӮеҜ№йҪҗгҖ?;
  }
  
  if ((host === 88200 && wdm === 48000) || (host === 192000 && wdm === 44100)) {
    algo = 'йқһж•ҙеҖҚж•°жһҒжҒ¶еҠЈзўҺзӮ№еҲҮеҲ?SRCзҹ©йҳө';
    st = 'fail';
    autoDesc = 'и·Ёйў‘еҖҚж•°дёҚж•ҙпјҢеҜјиҮҙе®ҝдё»е’ҢйҖҡи®Ҝз«ҜеҸЈж—¶й’ҹжү“жһ¶гҖӮејәз®—еҠӣжҚҹиҖ—пјҢдё”еӯҳеңЁеҝ…з„¶зҲҶйҹіж–ӯжөҒзҡ„жӯ»еҢәгҖ?;
  }

  document.getElementById('i_algo').value = algo;
  document.getElementById('i_status').value = st;
  
  if (autoDesc && (descObj.value.trim() === '' || descObj.value.startsWith('гҖҗAIиҜҠж–ӯгҖ?) || descObj.value.startsWith('е…ій—ӯжӢүдјёиЎҘеҒҝеҗҺзҡ„жһҒиҮҙзЁіе®ҡ'))) {
     descObj.value = 'гҖҗAIиҜҠж–ӯгҖ? + autoDesc;
  }
  
  saveFormCache();
}

  const file = e.target.files[0];
  if (!file) {
    document.getElementById('i_audio_b64').value = "";
    return;
  }
  
  // Strict file format restriction
  const validExts = ['mp3', 'wav'];
  const fileName = file.name.toLowerCase();
  const ext = fileName.split('.').pop();
  if (!validExts.includes(ext) && !file.type.includes('mpeg') && !file.type.includes('wav')) {
    alert("вӣ?ж јејҸй”ҷиҜҜпјҡдёәдҝқиҜҒе…је®№жҖ§д»ҘеҸҠзі»з»ҹзЁіе®ҡпјҢеҸӘиғҪдёҠдј жҲ–жҢӮиҪҪж ҮеҮҶзҡ„ MP3 жҲ?WAV йҹійў‘ж јејҸпј?);
    e.target.value = "";
    document.getElementById('i_audio_b64').value = "";
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
      alert("рҹ“Ұ ж–Үд»¶дҪ“з§ҜиҝҮдәҺеәһеӨ§ (и¶…иҝҮ 20MB)пјҒдёәдҝқжҠӨйҖҡдҝЎжңҚеҠЎеҷЁе…ҚеҸ—жҙӘжіӣж”»еҮ»пјҢжңҚеҠЎеҷЁжӢ’ж”¶иҝҮеӨ§ж•°жҚ®пјҢиҜ·жҲӘеҸ–зүҮж®өеҶҚдј гҖ?);
      e.target.value = "";
      return;
  }
  
  // дё»еҠЁйҳ»ж–ӯжҸҗдәӨжҢүй’®пјҢзӣҙжҺҘйў„жҸҗйҹійў‘дёҠдә?  const btn = document.querySelector('.add-btn');
  btn.disabled = true;
  btn.innerText = "вҸ?еҪ•йҹізӢ¬з«Ӣйў„еҠ иҪҪдёӯ...";

  const pCon = document.getElementById("upload_progress_container");
  const pTxt = document.getElementById("upload_progress_text");
  const pBar = document.getElementById("upload_progress_bar");

  const formData = new FormData();
  formData.append('action', 'upload_audio_only');
  formData.append('id', Date.now()); // Fallback random id seed
  formData.append('audio_file', file);

  (async () => {
      try {
          let r = await uploadViaXHR(API_URL, formData, file);
          if (!r.ok) r = await uploadViaXHR('/asmrtap.php?api=test_logs', formData, file);
          
          if (r.ok) {
              const res = await r.json();
              if (res.url) {
                  // е°ҶжӢҝеӣһзҡ„зІҫз®Җ URL ж”ҫе…Ҙз§ҳеҜҶиғҢеӣҠ
                  document.getElementById('i_audio_b64').value = res.url;
                  saveFormCache();
              }
          } else {
              alert("вҡ пёҸ еҪ•йҹіж–Үд»¶зӢ¬з«Ӣйў„еҠ иҪҪеӨұиҙ?(еҸҜиғҪжҳҜиў«йҳІзҒ«еўҷжӢҰжҲӘжҲ–иҝһжҺҘи¶…ж—¶)гҖ?);
              e.target.value = "";
              document.getElementById('i_audio_b64').value = "";
          }
      } catch (err) {
          alert("дёҠдј ејӮеёёпјҢиҜ·жЈҖжҹҘзҪ‘з»ңпјҒ");
          e.target.value = "";
      } finally {
          btn.innerText = "рҹ“Ҙ еӣһеЎ«жҲҗеҠҹ (зӮ№еҮ»еҶҷе…Ҙеә?";
          btn.disabled = false;
          
          setTimeout(() => {
              pCon.style.display = "none";
              pTxt.style.display = "none";
              pBar.style.width = "0%";
              pBar.style.background = "var(--cyan)";
              if(btn.innerText.includes("зӮ№еҮ»еҶҷе…Ҙеә?)){
                  btn.innerText = "рҹ“Ҙ еҶҷе…ҘеҲ°жөӢиҜ•еә“"; // жҒўеӨҚеҺҹе§Ӣеҗ?              }
          }, 2000);
      }
  })();
});

// Init
loadFormCache();
loadData();
</script>
